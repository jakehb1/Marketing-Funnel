    { id: "p1", name: "Awareness", funnel: "Chronic Pain Patient", x: 500, y: 100, color: "#7C6BC4" },
    { id: "p2", name: "Landing", funnel: "Chronic Pain Patient", x: 500, y: 170, color: "#7C6BC4" },
    { id: "p3", name: "Waitlist", funnel: "Chronic Pain Patient", x: 500, y: 240, color: "#7C6BC4" },
    { id: "p4", name: "Nurture", funnel: "Chronic Pain Patient", x: 500, y: 310, color: "#7C6BC4" },
    
    // Referral
    { id: "r1", name: "Referral", funnel: "Referral Loop", x: 700, y: 100, color: "#C4775A" },
    
    // Owned
    { id: "o1", name: "Announce", funnel: "Charlie's Owned", x: 900, y: 100, color: "#5A8FC4" }
  ];

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - 60;
  }

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function drawCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#F5F3EE';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw connections
    for (let i = 0; i < nodes.length - 1; i++) {
      if (nodes[i].funnel === nodes[i+1].funnel) {
        drawArrow(nodes[i], nodes[i+1], nodes[i].color);
      }
    }

    // Draw nodes
    nodes.forEach(node => {
      drawNode(node, node === selectedNode);
    });
  }

  function drawArrow(from, to, color) {
    const x1 = from.x * zoom + panX;
    const y1 = from.y * zoom + panY;
    const x2 = to.x * zoom + panX;
    const y2 = to.y * zoom + panY;

    ctx.strokeStyle = color + '40';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x1, y1 + 20);
    ctx.lineTo(x2, y2 - 20);
    ctx.stroke();

    const angle = Math.atan2(y2 - y1, x2 - x1);
    ctx.fillStyle = color + '80';
    ctx.beginPath();
    ctx.moveTo(x2 - 8 * Math.cos(angle - Math.PI / 6), y2 - 8 * Math.sin(angle - Math.PI / 6));
    ctx.lineTo(x2, y2);
    ctx.lineTo(x2 - 8 * Math.cos(angle + Math.PI / 6), y2 - 8 * Math.sin(angle + Math.PI / 6));
    ctx.fill();
  }

  function drawNode(node, selected) {
    const x = node.x * zoom + panX;
    const y = node.y * zoom + panY;
    const size = 40;

    ctx.shadowColor = 'rgba(0,0,0,0.2)';
    ctx.shadowBlur = 8;

    ctx.fillStyle = selected ? node.color : node.color + 'cc';
    ctx.beginPath();
    ctx.arc(x, y, size / 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = selected ? '#000' : node.color;
    ctx.lineWidth = selected ? 3 : 2;
    ctx.stroke();

    ctx.shadowColor = 'transparent';

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(node.name, x, y);

    node._x = x;
    node._y = y;
    node._size = size / 2;
  }

  canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left - panX) / zoom;
    const y = (e.clientY - rect.top - panY) / zoom;

    let clicked = null;
    nodes.forEach(node => {
      if (Math.hypot(node.x - x, node.y - y) < node._size + 10) {
        clicked = node;
      }
    });

    if (clicked) {
      selectedNode = clicked;
      showPanel(clicked);
      drawCanvas();
    } else {
      isDragging = true;
      dragStart = { x: e.clientX, y: e.clientY, panX, panY };
    }
  });

  canvas.addEventListener('mousemove', (e) => {
    if (isDragging) {
      panX = dragStart.panX + (e.clientX - dragStart.x);
      panY = dragStart.panY + (e.clientY - dragStart.y);
      drawCanvas();
    }
  });

  canvas.addEventListener('mouseup', () => {
    isDragging = false;
  });

  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const oldZoom = zoom;
    zoom *= e.deltaY < 0 ? 1.1 : 0.9;
    zoom = Math.max(0.5, Math.min(2, zoom));

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    panX = x - (x - panX) * (zoom / oldZoom);
    panY = y - (y - panY) * (zoom / oldZoom);

    drawCanvas();
  });

  // ZOOM CONTROLS
  document.getElementById('zoomIn').addEventListener('click', () => {
    zoom = Math.min(2, zoom * 1.2);
    drawCanvas();
  });

  document.getElementById('zoomOut').addEventListener('click', () => {
    zoom = Math.max(0.5, zoom / 1.2);
    drawCanvas();
  });

  document.getElementById('zoomReset').addEventListener('click', () => {
    zoom = 1;
    panX = panY = 0;
    drawCanvas();
  });

  // PANEL
  function showPanel(node) {
    const data = contentData[node.id];
    if (!data) return;

    document.getElementById('panelTitle').textContent = node.name;
    document.getElementById('panelFunnel').textContent = data.funnel;
    document.getElementById('panelFunnel').className = 'badge ' + data.funnel.toLowerCase().split(' ')[0];

    document.getElementById('desc').textContent = data.desc;
    document.getElementById('keyMsg').textContent = data.keyMsg;
    document.getElementById('convRate').textContent = data.convRate;

    document.getElementById('lpHeadline').textContent = data.lpHeadline;
    document.getElementById('lpCopy').textContent = data.lpCopy;
    document.getElementById('cta').textContent = data.cta;

    // Emails
    let emailHtml = '';
    if (data.emails.length > 0) {
      data.emails.forEach((email, idx) => {
        emailHtml += `
          <div class="section">
            <h3>${email.subject}</h3>
            <div class="copy-box">
              ${email.body}
              <button class="copy-btn" onclick="copyToClipboard(\`${email.body.replace(/`/g, '\\`')}\`)">Copy</button>
            </div>
          </div>
        `;
      });
    } else {
      emailHtml = '<p style="color: #999;">No email copy for this stage.</p>';
    }
    document.getElementById('emailContent').innerHTML = emailHtml;

    // Ads
    let adHtml = '';
    if (data.ads.length > 0) {
      data.ads.forEach(ad => {
        adHtml += `
          <div class="section">
            <h3>${ad.platform}</h3>
            <div class="copy-box">
              ${ad.copy}
              <button class="copy-btn" onclick="copyToClipboard(\`${ad.copy.replace(/`/g, '\\`')}\`)">Copy</button>
            </div>
          </div>
        `;
      });
    } else {
      adHtml = '<p style="color: #999;">No ad copy for this stage.</p>';
    }
    document.getElementById('adContent').innerHTML = adHtml;

    // Quotes
    let quoteHtml = '';
    data.quotes.forEach(quote => {
      quoteHtml += `<div class="quote">"${quote}"</div>`;
    });
    document.getElementById('quoteContent').innerHTML = quoteHtml;

    // Setup tab clicks
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(btn.dataset.tab).classList.add('active');
        btn.classList.add('active');
      });
    });

    document.getElementById('panel').classList.add('open');
  }

  function closePanel() {
    document.getElementById('panel').classList.remove('open');
    selectedNode = null;
    drawCanvas();
  }

  function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => {
      alert('Copied to clipboard!');
    });
  }

  // INIT
  drawCanvas();
</script>

</body>
</html>
