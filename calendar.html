<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campaign Calendar - ENNIE Marketing</title>
  <style>
    /* WARM MINIMAL WELLNESS AESTHETIC */
    :root {
      /* Color Palette */
      --bg-main: #F5F5F0;
      --bg-card: #FFFFFF;
      --color-primary: #7FA997;
      --color-accent: #A89973;
      --color-text: #2C2C2C;
      --color-text-secondary: #6B7280;
      --color-border: #E8E4DE;
      --color-success: #7FA997;
      --color-warning: #A89973;
      
      /* Typography */
      --font-serif: Georgia, Garamond, serif;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-size-h1: 36px;
      --font-size-h2: 24px;
      --font-size-h3: 18px;
      --font-size-body: 14px;
      --font-size-caption: 12px;
      
      --font-weight-header: 600;
      --font-weight-semibold: 500;
      --font-weight-regular: 400;
      
      /* Spacing */
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 12px;
      --spacing-lg: 16px;
      --spacing-xl: 20px;
      --spacing-2xl: 24px;
      --spacing-3xl: 32px;
      
      /* Shadows - subtle */
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 2px 4px rgba(0, 0, 0, 0.08);
      
      --transition-base: all 0.2s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-main);
      color: var(--color-text);
      padding: var(--spacing-xl);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .back-link {
      display: inline-block;
      font-size: var(--font-size-caption);
      color: var(--color-primary);
      text-decoration: none;
      margin-bottom: var(--spacing-xl);
      font-weight: var(--font-weight-semibold);
      transition: var(--transition-base);
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .header {
      margin-bottom: var(--spacing-3xl);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: var(--spacing-xl);
    }

    .header-left h1 {
      font-family: var(--font-serif);
      font-size: var(--font-size-h1);
      font-weight: var(--font-weight-header);
      margin-bottom: var(--spacing-md);
      letter-spacing: -0.5px;
      color: var(--color-text);
    }

    .header-left p {
      font-size: var(--font-size-caption);
      color: var(--color-text-secondary);
    }

    .view-toggle {
      display: flex;
      gap: var(--spacing-sm);
      background: var(--bg-card);
      padding: var(--spacing-sm);
      border-radius: 6px;
      border: 1px solid var(--color-border);
    }

    .toggle-btn {
      padding: var(--spacing-sm) var(--spacing-lg);
      border: none;
      border-radius: 4px;
      font-size: var(--font-size-caption);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      background: transparent;
      color: var(--color-text-secondary);
      transition: var(--transition-base);
    }

    .toggle-btn.active {
      background: var(--color-primary);
      color: white;
    }

    .calendar-view {
      background: var(--bg-card);
      border-radius: 8px;
      border: 1px solid var(--color-border);
      padding: var(--spacing-2xl);
      margin-bottom: var(--spacing-3xl);
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-2xl);
      flex-wrap: wrap;
      gap: var(--spacing-lg);
    }

    .calendar-header h2 {
      font-family: var(--font-serif);
      font-size: var(--font-size-h2);
      font-weight: var(--font-weight-header);
      letter-spacing: -0.5px;
      color: var(--color-text);
    }

    .calendar-nav {
      display: flex;
      gap: var(--spacing-sm);
    }

    .nav-btn {
      padding: var(--spacing-sm) var(--spacing-lg);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      background: var(--bg-card);
      cursor: pointer;
      font-size: var(--font-size-caption);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-secondary);
      transition: var(--transition-base);
    }

    .nav-btn:hover {
      background: var(--bg-main);
      color: var(--color-primary);
      border-color: var(--color-primary);
    }

    .month-calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: var(--spacing-md);
    }

    .day-header {
      font-size: 11px;
      font-weight: var(--font-weight-header);
      color: var(--color-text-secondary);
      text-align: center;
      padding: var(--spacing-md);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .day {
      aspect-ratio: 1;
      background: var(--bg-main);
      border-radius: 8px;
      padding: var(--spacing-md);
      display: flex;
      flex-direction: column;
      position: relative;
      cursor: pointer;
      transition: var(--transition-base);
      border: 1px solid transparent;
    }

    .day:hover {
      background: #f0f0ea;
      border-color: var(--color-primary);
    }

    .day.other-month {
      background: var(--bg-card);
      color: #D1D5DB;
    }

    .day-number {
      font-size: 12px;
      font-weight: var(--font-weight-semibold);
      margin-bottom: var(--spacing-sm);
      color: var(--color-text-secondary);
    }

    .day-events {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .event-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .timeline-view {
      display: none;
    }

    .timeline-view.active {
      display: block;
    }

    .timeline {
      position: relative;
      padding: var(--spacing-xl) 0;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 120px 1fr 150px;
      gap: var(--spacing-xl);
      padding: var(--spacing-lg);
      background: var(--bg-main);
      border-radius: 8px;
      border: 1px solid var(--color-border);
      margin-bottom: var(--spacing-md);
      align-items: center;
      cursor: pointer;
      transition: var(--transition-base);
    }

    .timeline-item:hover {
      border-color: var(--color-primary);
      box-shadow: var(--shadow-md);
    }

    .timeline-date {
      font-size: var(--font-size-caption);
      font-weight: var(--font-weight-header);
      color: var(--color-text-secondary);
    }

    .timeline-content {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }

    .timeline-name {
      font-weight: var(--font-weight-header);
      color: var(--color-text);
      font-size: var(--font-size-body);
    }

    .timeline-details {
      font-size: var(--font-size-caption);
      color: var(--color-text-secondary);
    }

    .status-badge {
      display: inline-block;
      padding: var(--spacing-xs) var(--spacing-md);
      border-radius: 12px;
      font-size: 10px;
      font-weight: var(--font-weight-header);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-active {
      background: rgba(127, 169, 151, 0.1);
      color: var(--color-success);
    }

    .status-paused {
      background: rgba(168, 153, 115, 0.1);
      color: var(--color-warning);
    }

    .status-scheduled {
      background: rgba(127, 169, 151, 0.1);
      color: var(--color-primary);
    }

    .legend {
      display: flex;
      gap: var(--spacing-2xl);
      flex-wrap: wrap;
      padding: var(--spacing-2xl);
      background: var(--bg-card);
      border-radius: 8px;
      border: 1px solid var(--color-border);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      font-size: var(--font-size-caption);
    }

    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--bg-card);
      border-radius: 8px;
      padding: var(--spacing-3xl);
      max-width: 500px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: var(--spacing-lg);
      right: var(--spacing-lg);
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--color-text-secondary);
    }

    .modal-title {
      font-family: var(--font-serif);
      font-size: var(--font-size-h2);
      font-weight: var(--font-weight-header);
      margin-bottom: var(--spacing-lg);
      letter-spacing: -0.3px;
      color: var(--color-text);
    }

    .modal-field {
      margin-bottom: var(--spacing-lg);
    }

    .modal-label {
      font-size: var(--font-size-caption);
      font-weight: var(--font-weight-header);
      color: var(--color-text-secondary);
      margin-bottom: var(--spacing-sm);
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .modal-value {
      font-size: var(--font-size-body);
      color: var(--color-text);
    }

    .modal-actions {
      display: flex;
      gap: var(--spacing-md);
      margin-top: var(--spacing-2xl);
    }

    .btn {
      flex: 1;
      padding: var(--spacing-lg);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      background: var(--bg-card);
      color: var(--color-text-secondary);
      font-size: var(--font-size-caption);
      font-weight: var(--font-weight-header);
      cursor: pointer;
      transition: var(--transition-base);
    }

    .btn:hover {
      background: var(--bg-main);
      border-color: var(--color-primary);
    }

    .btn.primary {
      background: var(--color-primary);
      color: white;
      border-color: var(--color-primary);
    }

    .btn.primary:hover {
      background: #6d8f7f;
    }

    @media (max-width: 768px) {
      body {
        padding: var(--spacing-lg);
      }

      .header {
        flex-direction: column;
      }

      .month-calendar {
        gap: var(--spacing-sm);
      }

      .day {
        padding: var(--spacing-sm);
      }

      .timeline-item {
        grid-template-columns: 1fr;
        gap: var(--spacing-md);
      }

      .modal-content {
        width: 95%;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <a href="master-hub.html" class="back-link"> Back to Command Center</a>

  <div class="header">
    <div class="header-left">
      <h1>Campaign Calendar</h1>
      <p>Timeline view of all campaigns with launch dates, budgets, and status</p>
    </div>
    <div class="view-toggle">
      <button class="toggle-btn active" onclick="switchView('month')">Month View</button>
      <button class="toggle-btn" onclick="switchView('timeline')">Timeline</button>
    </div>
  </div>

  <div id="month" class="calendar-view">
    <div class="calendar-header">
      <h2 id="monthTitle">April 2026</h2>
      <div class="calendar-nav">
        <button class="nav-btn" onclick="previousMonth()"> Prev</button>
        <button class="nav-btn" onclick="todayMonth()">Today</button>
        <button class="nav-btn" onclick="nextMonth()">Next </button>
      </div>
    </div>
    <div class="month-calendar" id="monthCalendar"></div>
  </div>

  <div id="timeline-container" class="calendar-view timeline-view">
    <div class="calendar-header">
      <h2>Campaign Timeline</h2>
    </div>
    <div class="timeline" id="timeline"></div>
  </div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-color" style="background: #7FA997;"></div>
      <span>Healer Funnel</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background: #7FA997;"></div>
      <span>Patient Funnel</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background: #A89973;"></div>
      <span>Referral Funnel</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background: #A89973;"></div>
      <span>Untrained Funnel</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background: #7FA997;"></div>
      <span>Owned Funnel</span>
    </div>
  </div>
</div>

<div class="modal" id="campaignModal">
  <div style="position: relative; width: 100%;">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">•</button>
      <h2 class="modal-title" id="modalTitle">Campaign Details</h2>
      <div id="modalBody"></div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">Close</button>
        <button class="btn primary" onclick="editCampaign()">Edit Campaign</button>
      </div>
    </div>
  </div>
</div>

<script>
  let currentDate = new Date(2026, 3, 1);
  let selectedCampaign = null;

  const campaigns = [
    {
      id: 1,
      name: 'Patient Awareness - Instagram',
      funnel: 'patient',
      status: 'active',
      startDate: new Date(2026, 3, 5),
      endDate: new Date(2026, 3, 25),
      budget: '$8,500',
      spent: '$6,200',
      conversions: 245
    },
    {
      id: 2,
      name: 'Healer Recruitment - Google Ads',
      funnel: 'healer',
      status: 'active',
      startDate: new Date(2026, 3, 8),
      endDate: new Date(2026, 3, 30),
      budget: '$12,000',
      spent: '$9,800',
      conversions: 412
    },
    {
      id: 3,
      name: 'Referral Program Launch',
      funnel: 'referral',
      status: 'scheduled',
      startDate: new Date(2026, 4, 1),
      endDate: new Date(2026, 4, 20),
      budget: '$5,000',
      spent: '$0',
      conversions: 0
    },
    {
      id: 4,
      name: 'Patient Retention - Email',
      funnel: 'patient',
      status: 'active',
      startDate: new Date(2026, 3, 12),
      endDate: new Date(2026, 5, 12),
      budget: '$3,200',
      spent: '$1,600',
      conversions: 189
    }
  ];

  function renderMonth() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const daysInMonth = lastDay.getDate();
    const startingDayOfWeek = firstDay.getDay();

    const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    document.getElementById('monthTitle').textContent = `${monthNames[month]} ${year}`;

    const calendar = document.getElementById('monthCalendar');
    calendar.innerHTML = '';

    const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    dayNames.forEach(name => {
      const header = document.createElement('div');
      header.className = 'day-header';
      header.textContent = name;
      calendar.appendChild(header);
    });

    for (let i = 0; i < startingDayOfWeek; i++) {
      const emptyDay = document.createElement('div');
      emptyDay.className = 'day other-month';
      calendar.appendChild(emptyDay);
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const dayEl = document.createElement('div');
      dayEl.className = 'day';
      dayEl.innerHTML = `<div class="day-number">${day}</div><div class="events"></div>`;

      const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      const dayCampaigns = campaigns.filter(c => {
        const cStart = `${c.startDate.getFullYear()}-${String(c.startDate.getMonth() + 1).padStart(2, '0')}-${String(c.startDate.getDate()).padStart(2, '0')}`;
        const cEnd = `${c.endDate.getFullYear()}-${String(c.endDate.getMonth() + 1).padStart(2, '0')}-${String(c.endDate.getDate()).padStart(2, '0')}`;
        return dateStr >= cStart && dateStr <= cEnd;
      });

      if (dayCampaigns.length > 0) {
        const colors = { healer: '#7FA997', patient: '#7FA997', referral: '#A89973', untrained: '#A89973', owned: '#7FA997' };
        dayCampaigns.forEach(c => {
          const dot = document.createElement('div');
          dot.className = 'event-dot';
          dot.style.background = colors[c.funnel];
          dayEl.querySelector('.events').appendChild(dot);
        });
      }

      calendar.appendChild(dayEl);
    }
  }

  function renderTimeline() {
    const timeline = document.getElementById('timeline');
    timeline.innerHTML = campaigns.map(c => `
      <div class="timeline-item" onclick="showCampaignModal(${c.id})">
        <div class="timeline-date">${c.startDate.toLocaleDateString()}</div>
        <div class="timeline-content">
          <div class="timeline-name">${c.name}</div>
          <div class="timeline-details">${c.budget} budget ˘ ${c.conversions} conversions</div>
        </div>
        <span class="status-badge status-${c.status.toLowerCase()}">${c.status}</span>
      </div>
    `).join('');
  }

  function switchView(view) {
    document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');

    if (view === 'month') {
      document.getElementById('month').style.display = 'block';
      document.getElementById('timeline-container').classList.remove('active');
    } else {
      document.getElementById('month').style.display = 'none';
      document.getElementById('timeline-container').classList.add('active');
      renderTimeline();
    }
  }

  function previousMonth() {
    currentDate.setMonth(currentDate.getMonth() - 1);
    renderMonth();
  }

  function nextMonth() {
    currentDate.setMonth(currentDate.getMonth() + 1);
    renderMonth();
  }

  function todayMonth() {
    currentDate = new Date();
    renderMonth();
  }

  function showCampaignModal(id) {
    selectedCampaign = campaigns.find(c => c.id === id);
    if (!selectedCampaign) return;

    document.getElementById('modalTitle').textContent = selectedCampaign.name;
    document.getElementById('modalBody').innerHTML = `
      <div class="modal-field">
        <label class="modal-label">Status</label>
        <div class="modal-value"><span class="status-badge status-${selectedCampaign.status.toLowerCase()}">${selectedCampaign.status}</span></div>
      </div>
      <div class="modal-field">
        <label class="modal-label">Budget</label>
        <div class="modal-value">${selectedCampaign.budget}</div>
      </div>
      <div class="modal-field">
        <label class="modal-label">Spent</label>
        <div class="modal-value">${selectedCampaign.spent}</div>
      </div>
      <div class="modal-field">
        <label class="modal-label">Conversions</label>
        <div class="modal-value">${selectedCampaign.conversions}</div>
      </div>
      <div class="modal-field">
        <label class="modal-label">Date Range</label>
        <div class="modal-value">${selectedCampaign.startDate.toLocaleDateString()} - ${selectedCampaign.endDate.toLocaleDateString()}</div>
      </div>
    `;
    document.getElementById('campaignModal').classList.add('active');
  }

  function closeModal() {
    document.getElementById('campaignModal').classList.remove('active');
  }

  function editCampaign() {
    alert('Edit campaign: ' + selectedCampaign.name);
    closeModal();
  }

  document.addEventListener('DOMContentLoaded', renderMonth);
</script>

</body>
</html>
